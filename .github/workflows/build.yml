name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        
      
    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libgdbm-dev libsqlite3-dev libbz2-dev libffi-dev tk-dev libdb5.3-dev libgdbm-compat-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.36

    - name: Build APK with Buildozer
      run: |
        buildozer android debug
        
    - name: Create Custom Source Zip
      run: |
        # ДОБАВЛЯЕМ НАШ СКРИПТ В СПИСОК ЗАГРУЗОК (ЧЕРЕЗ ЗАПЯТУЮ)
        #zip -r source_code.zip main.py service.py buildozer.spec tinytuya.py
        # УПАКОВЫВАЕМ ВСЁ ПОДРЯД, НО ВЫКИДЫВАЕМ ГИГАНТСКИЙ КЭШ БИЛДОЗЕРА
        #zip -r source_code.zip . -x ".*" ".buildozer/*"
        zip -r source_code.zip . -x ".buildozer/*" ".git/*"
      
    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.10
        name: Release v1.0.10
        # АВТОНУМЕРАЦИЯ: каждый коммит создаст уникальный тег (v1.0.блок_счетчика)
        #tag_name: v1.0.${{ github.run_number }}
        #name: Release v1.0.${{ github.run_number }}
        
        #files: bin/*.apk
        files: |
          bin/*.apk
          source_code.zip          
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#-_--------_-
