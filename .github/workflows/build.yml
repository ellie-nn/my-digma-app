name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}v13
      
    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libgdbm-dev libsqlite3-dev libbz2-dev libffi-dev tk-dev libdb5.3-dev libgdbm-compat-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.36
        

    - name: Force Buildozer to Unpack Kivy Core
      run: |
        echo "=== [STEP 1] ЗАСТАВЛЯЕМ БИЛДОЗЕР СКАЧАТЬ И РАСПАКОВАТЬ АРХИВЫ KIVY ==="
        # Эта легкая системная команда заставит Buildozer создать папку .buildozer, 
        # скачать python-for-android и распаковать все скрытые шаблоны манифестов на диск,
        # но ОСТАНОВИТ конвейер, не запуская сборку самого APK!
        buildozer android p4a -- --help
        
    - name: Inspect Generated Manifests
      run: |
        echo "=== [STEP 4] ИНСПЕКЦИЯ РЕЗУЛЬТАТА ==="
        find . -name "AndroidManifest.xml" -type f | while read -r file; do
          echo "----------------------------------------"
          echo "ФАЙЛ: $file"
          echo "----------------------------------------"
          head -n 600 "$file"
        done
        
    - name: Hack Kivy Java Core to Persistent-Immortal
      run: |
        echo "=== [HACK] ХИРУРГИЧЕСКИЙ НАДРЕЗ В ЯДРЕ KIVY ==="
        find .buildozer/ -name "PythonService.java" -type f | while read -r java_file; do
          echo "Модифицируем системный файл: $java_file"
      
          # ХИРУРГИЧЕСКИЙ ЗАЖИМ БЕЗ ФЛАГА 'g':
          # Мы ищем строго строку возврата "return START_NOT_STICKY;" и меняем её 
          # на "return START_STICKY;". Соседние методы ядра Kivy останутся абсолютно нетронутыми!
          sed -i "s|return START_NOT_STICKY;|return START_STICKY;|gw /dev/stdout" "$java_file"          
        done
        #&-_-_-_-_-20-_-_-_-_&-_-_-_-_-&_-_-_-_-_&  
           # === НАШ ВЕЧНЫЙ ЦИФРОВОЙ ПАСПОРТ, ВШИТЫЙ ПРЯМО В КОД ===
    - name: Inject Embedded Keystore Passport
      run: |
        echo "=== [PASSPORT] Восстанавливаем вечный цифровой штамп из текста ==="
        # Заменяем весь текст внутри кавычек ниже на ваш заветный набор символов (без пробелов!).
        # Гитхаб налету превратит этот текст обратно в легальный физический файл ключа digma.keystore
        echo "" | base64 --decode > $HOME/digma.keystore
        
        # Намертво привязываем этот вечный детерминированный ключ к сборке Билдозера!
        # Мы используем стандартные debug-пароли, так как криптостойкость держится на самом ключе RSA-2048
        echo "P4A_RELEASE_KEYSTORE=$HOME/digma.keystore" >> $GITHUB_ENV
        echo "P4A_RELEASE_KEYSTORE_PASSWD=android" >> $GITHUB_ENV
        echo "P4A_RELEASE_KEY_ALIAS=androiddebugkey" >> $GITHUB_ENV
        echo "P4A_RELEASE_KEY_PASSWD=android" >> $GITHUB_ENV
 
    - name: Final Build with Buildozer
      run: |
        echo "=== [STEP 3] ЗАПУСКАЕМ ТЯЖЕЛУЮ СБОРКУ APK ==="
        # Теперь Buildozer проснется, полезет в свою папку, возьмет измененный нами шаблон 
        # и Gradle намертво зашьет опечатку и службу в итоговый бинарный манифест!
        buildozer android debug

    - name: Inspect Generated Manifests
      run: |
        echo "=== [STEP 4] ИНСПЕКЦИЯ РЕЗУЛЬТАТА ==="
        find . -name "AndroidManifest.xml" -type f | while read -r file; do
          echo "----------------------------------------"
          echo "ФАЙЛ: $file"
          echo "----------------------------------------"
          head -n 600 "$file"
        done

    
    - name: Create Custom Source Zip
      run: |
        # ДОБАВЛЯЕМ НАШ СКРИПТ В СПИСОК ЗАГРУЗОК (ЧЕРЕЗ ЗАПЯТУЮ)
        #zip -r source_code.zip main.py service.py buildozer.spec tinytuya.py
        # УПАКОВЫВАЕМ ВСЁ ПОДРЯД, НО ВЫКИДЫВАЕМ ГИГАНТСКИЙ КЭШ БИЛДОЗЕРА
        #zip -r source_code.zip . -x ".*" ".buildozer/*"
        zip -r source_code.zip . -x ".buildozer/*" ".git/*"
      
    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.13
        name: Release v1.0.13
        # АВТОНУМЕРАЦИЯ: каждый коммит создаст уникальный тег (v1.0.блок_счетчика)
        #tag_name: v1.0.${{ github.run_number }}
        #name: Release v1.0.${{ github.run_number }}
        
        #files: bin/*.apk
        files: |
          bin/*.apk
          source_code.zip          
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: ONE_TIME_GENERATE_PASSPORT
      run: |
        echo "=== ГЕНЕРИРУЕМ ОФИЦИАЛЬНЫЙ ПАСПОРТ ПРИЛОЖЕНИЯ ==="
        # Создаем стандартный debug-ключ, который понимает Android и Buildozer
        keytool -genkey -v -keystore $HOME/digma.keystore \
          -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=Android Debug, O=Android, C=US"
        
        echo "=== ВЫВОДИМ ЕГО НА ЭКРАН В ВИДЕ ТЕКСТА (BASE64) ==="
        # Эта команда превратит файл ключа в длинную текстовую строку букв и цифр!
        base64 -w 0 $HOME/digma.keystore
        echo ""

#-_--------_-
